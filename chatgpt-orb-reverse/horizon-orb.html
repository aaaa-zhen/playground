<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ChatGPT Horizon Orb</title>
<style>
  :root{
    --ink:#1a1a1a; --ink-soft:#3a3a3a; --ink-dim:#9a9a9a;
    --line:#e3e2df; --bg:#f7f6f4; --panel:#ffffff;
    --mono:"SF Mono",ui-monospace,Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI","Helvetica Neue","Microsoft YaHei",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);color:var(--ink);font:14px/1.5 var(--sans);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:100dvh;overflow:hidden;-webkit-font-smoothing:antialiased;
  }

  /* stage — the orb composites with premultiplied alpha, so the canvas is transparent.
     orb + panel center together as one group, so the controls sit right under the orb */
  #stage{width:100%;display:flex;align-items:center;justify-content:center}
  /* canvas is 1/0.72 larger than the orb (JELLY.baseScale) so the directional
     stretch has room without clipping at the canvas edge */
  canvas{width:min(79vmin,544px);height:min(79vmin,544px);display:block;
    flex-shrink:0;cursor:grab;touch-action:none}
  canvas:active{cursor:grabbing}

  /* control panel — swatch row + labeled option rows, right under the orb */
  #panel{display:flex;flex-direction:column;gap:2px;width:min(64vmin,440px);
    padding:22px 2px calc(18px + env(safe-area-inset-bottom))}
  .row{display:flex;align-items:center}
  .row.pals{justify-content:space-between;margin-bottom:16px}
  .row.opt{justify-content:space-between;gap:12px}
  .lab{font-size:13px;font-weight:600;color:var(--ink)}
  .opts{display:flex;align-items:center;gap:2px;flex-wrap:wrap;justify-content:flex-end}
  .opts button{
    -webkit-appearance:none;appearance:none;cursor:pointer;
    font-family:var(--sans);font-size:13px;color:var(--ink-dim);
    background:none;border:1px solid transparent;border-radius:999px;
    padding:6px 13px;transition:.15s;
  }
  .opts button:hover{color:var(--ink)}
  .opts button:active{transform:scale(.96)}
  .opts button.on{color:var(--ink);border-color:#c9c8c3;background:var(--panel)}

  /* palette swatches — the palette's own ramp, pale top → shadow bottom;
     selected ring picks up the palette's shadow color (set as --ring per button) */
  .pal{-webkit-appearance:none;appearance:none;cursor:pointer;
    width:36px;height:36px;padding:0;border-radius:50%;border:none;transition:.15s}
  .pal:hover{transform:scale(1.08)}
  .pal:active{transform:scale(.95)}
  .pal.on{box-shadow:0 0 0 3px var(--bg),0 0 0 5.5px var(--ring,var(--ink))}

  .row.mic{justify-content:center;margin-top:16px}
  label.chk{display:inline-flex;align-items:center;gap:7px;font-size:13px;
    color:var(--ink-dim);user-select:none;cursor:pointer;transition:.15s}
  label.chk:hover{color:var(--ink)}
  label.chk input{accent-color:var(--ink)}

  /* tuning sliders — index.html .ad-prow aesthetic */
  .tune{margin-top:18px;padding-top:16px;border-top:1px solid var(--line);
    display:flex;flex-direction:column;gap:12px}
  .srow{display:flex;align-items:center;gap:12px}
  .srow label{font-size:13px;color:var(--ink-soft);flex:0 0 92px}
  .srow input[type=range]{flex:1;accent-color:var(--ink);height:3px;cursor:pointer}
  .srow .pv{font-family:var(--mono);font-size:12.5px;flex:0 0 40px;text-align:right;color:var(--ink)}

  #err{position:fixed;left:12px;right:12px;bottom:12px;background:rgba(180,30,20,.94);color:#fff;
    padding:10px 14px;border-radius:10px;font:12px var(--mono);white-space:pre-wrap;display:none}
</style>
</head>
<body>

<div id="stage"><canvas id="c"></canvas></div>

<div id="panel">
  <div class="row pals" id="palettes"></div>
  <div class="row opt">
    <span class="lab">State</span>
    <div class="opts" id="states">
      <button data-state="idle" class="on">Idle</button>
      <button data-state="listen">Listening</button>
      <button data-state="speak">Speaking</button>
    </div>
  </div>
  <div class="row mic">
    <label class="chk"><input type="checkbox" id="mic"> Use microphone</label>
  </div>
  <div class="tune">
    <div class="srow">
      <label>Resistance</label>
      <input id="sRes" type="range" min="0" max="100" value="95">
      <span class="pv" id="vRes">95</span>
    </div>
    <div class="srow">
      <label>Stretch</label>
      <input id="sStr" type="range" min="0" max="150" value="89">
      <span class="pv" id="vStr">0.89</span>
    </div>
    <div class="srow">
      <label>Grow</label>
      <input id="sGrow" type="range" min="0" max="90" value="20">
      <span class="pv" id="vGrow">0.20</span>
    </div>
    <div class="srow">
      <label>Stiffness <span style="color:var(--ink-dim)">k</span></label>
      <input id="sStiff" type="range" min="80" max="1200" step="10" value="190">
      <span class="pv" id="vStiff">190</span>
    </div>
    <div class="srow">
      <label>Damping <span style="color:var(--ink-dim)">ζ</span></label>
      <input id="sDmp" type="range" min="0.30" max="1.30" step="0.02" value="0.86">
      <span class="pv" id="vDmp">0.86</span>
    </div>
  </div>
</div>
<div id="err"></div>

uint rotateBits(uint value, uint shift) {
  return (value << shift) | (value >> (32u - shift));
}
void hashMix(inout uint a, inout uint b, inout uint c) {
  a -= c;
  a ^= rotateBits(c, 4u);
  c += b;
  b -= a;
  b ^= rotateBits(a, 6u);
  a += c;
  c -= b;
  c ^= rotateBits(b, 8u);
  b += a;
  a -= c;
  a ^= rotateBits(c, 16u);
  c += b;
  b -= a;
  b ^= rotateBits(a, 19u);
  a += c;
  c -= b;
  c ^= rotateBits(b, 4u);
  b += a;
}

void hashFinal(inout uint a, inout uint b, inout uint c) {
  c ^= b;
  c -= rotateBits(b, 14u);
  a ^= c;
  a -= rotateBits(c, 11u);
  b ^= a;
  b -= rotateBits(a, 25u);
  c ^= b;
  c -= rotateBits(b, 16u);
  a ^= c;
  a -= rotateBits(c, 4u);
  b ^= a;
  b -= rotateBits(a, 14u);
  c ^= b;
  c -= rotateBits(b, 24u);
}

uint hashUint2(uint x, uint y) {
  uint a = 0xdeadbeefu + (2u << 2u) + 13u;
  uint b = a;
  uint c = a;
  b += y;
  a += x;
  hashFinal(a, b, c);
  return c;
}

uint hashUint4(uint x, uint y, uint z, uint w) {
  uint a = 0xdeadbeefu + (4u << 2u) + 13u;
  uint b = a;
  uint c = a;
  a += x;
  b += y;
  c += z;
  hashMix(a, b, c);
  a += w;
  hashFinal(a, b, c);
  return c;
}

uint hashInt4(ivec4 value) {

float hashUint2ToFloat(uint x, uint y) {

float fadeNoise(float value) {

float signedComponent(float value, uint flag) {

float noiseGradient(uint hash, vec4 value) {

  float u = h < 24u ? value.x : value.y;
  float v = h < 16u ? value.y : value.z;
  float s = h < 8u ? value.z : value.w;
  return signedComponent(u, h & 1u) + signedComponent(v, h & 2u) + signedComponent(s, h & 4u);
}

float triMix(
  float v0,
  float v1,
  float v2,
  float v3,
  float v4,
  float v5,
  float v6,
  float v7,
  vec3 factor
) {
  float x1 = 1.0 - factor.x;
  float y1 = 1.0 - factor.y;
  float z1 = 1.0 - factor.z;
  return z1 * (y1 * (v0 * x1 + v1 * factor.x) + factor.y * (v2 * x1 + v3 * factor.x)) +
    factor.z * (y1 * (v4 * x1 + v5 * factor.x) + factor.y * (v6 * x1 + v7 * factor.x));
}

float perlin4(vec4 value) {

vec4 noiseRepeat4(vec4 value) {

  return value - vec4(100000.0) * trunc(value / vec4(100000.0)) + precisionCorrection;

float noiseFbm4(vec4 value, float detail, float roughness, float lacunarity, bool normalizeNoise) {
  float clampedDetail = clamp(detail, 0.0, 15.0);
  float clampedRoughness = max(roughness, 0.0);
  float frequency = 1.0;
  float amplitude = 1.0;
  float maxAmplitude = 0.0;
  float sum = 0.0;

  for (int i = 0; i <= 15; i++) {
    if (float(i) > floor(clampedDetail)) {
      break;
    }
    sum += signedNoise4(frequency * value) * amplitude;
    maxAmplitude += amplitude;
    amplitude *= clampedRoughness;
    frequency *= lacunarity;
  }

  float remainder = clampedDetail - floor(clampedDetail);
  if (remainder != 0.0) {
    float nextSum = sum + signedNoise4(frequency * value) * amplitude;
    if (normalizeNoise) {
      float normalizedA = 0.5 * sum / max(maxAmplitude, 0.000001) + 0.5;
      float normalizedB = 0.5 * nextSum / max(maxAmplitude + amplitude, 0.000001) + 0.5;
      return mix(normalizedA, normalizedB, remainder);
    }
    return mix(sum, nextSum, remainder);
  }

  if (normalizeNoise) {
    return 0.5 * sum / max(maxAmplitude, 0.000001) + 0.5;
  }
  return sum;
}

  value.x += value.y * value.w;
  value.y += value.z * value.x;
  value.z += value.x * value.y;

          if (distanceToPoint < minDistance) {

vec3 rotateX(vec3 value, float angle) {

  float s = sin(angle);
  return vec3(value.x, c * value.y - s * value.z, s * value.y + c * value.z);
}

vec3 rotateY(vec3 value, float angle) {

  float s = sin(angle);
  return vec3(c * value.x + s * value.z, value.y, -s * value.x + c * value.z);

vec3 rotateZ(vec3 value, float angle) {

}

vec3 rotateEulerXYZ(vec3 value, vec3 rotation) {

const float USER_SPEAKING_MIC_PULSE_SCALE = 0.08;
const float MIN_HORIZON_ORB_SCALE = 0.75;

const float PRE_CONNECTION_DOT_FRAME_RATE = 24.0;
const float PRE_CONNECTION_DOT_BASE_RADIUS = 0.1;
const float PRE_CONNECTION_DOT_RADIUS_PULSE_SCALE = 0.04;
const float PRE_CONNECTION_DOT_RADIUS_PERIOD_SECONDS = 0.7;

float preConnectionDotRadius(float frame) {
  float timeSeconds = frame / PRE_CONNECTION_DOT_FRAME_RATE;
  float pulse =
    sin(2.0 * 3.14159265 * timeSeconds / PRE_CONNECTION_DOT_RADIUS_PERIOD_SECONDS);

  return PRE_CONNECTION_DOT_BASE_RADIUS *
    (1.0 + PRE_CONNECTION_DOT_RADIUS_PULSE_SCALE * pulse);

float connectionRevealScale(float frame) {
  float revealAmount = clamp(uConnectionRevealAmount, 0.0, 1.0);
  float easedReveal = revealAmount * revealAmount * (3.0 - 2.0 * revealAmount);

  return mix(preConnectionDotRadius(frame), 1.0, easedReveal);

float horizonOrbScale(float frame) {
  float userSpeaking = clamp(uUserSpeakingScale, 0.0, 1.0);
  float micLevel = clamp(uMicLevel, 0.0, 1.0);
  float baseScale = 1.0 - userSpeaking * USER_SPEAKING_BASE_SCALE_REDUCTION;
  float pulseScale = userSpeaking * micLevel * USER_SPEAKING_MIC_PULSE_SCALE;

  float dotDistance = length(sdfPosition) - preConnectionDotRadius(frame);
  
  float dotShape = 1.0 - step(0.0, dotDistance);

  return uPreConnectionDotColor * dotShape;
}

  float frame = uBaseShaderFrame;

    return;

  vec2 scaledSdfPosition = vSdfPosition / orbScale;
  float sdfDistance = length(scaledSdfPosition) - 1.0;
  float edgeWidth = max(fwidth(sdfDistance), 0.000001);

  if (sdfDistance >= edgeWidth * 2.0) {

    return;

  vec3 interiorColor = texture(uInteriorTexture, interiorUv).rgb;
  float shape = 1.0 - smoothstep(

const float MIN_HORIZON_ORB_SCALE = 0.75;

const float PRE_CONNECTION_DOT_BASE_RADIUS = 0.1;
const float PRE_CONNECTION_DOT_RADIUS_PULSE_SCALE = 0.04;
const float PRE_CONNECTION_DOT_RADIUS_PERIOD_SECONDS = 0.7;

  float timeSeconds = frame / PRE_CONNECTION_DOT_FRAME_RATE;
  float pulse =
    sin(2.0 * 3.14159265 * timeSeconds / PRE_CONNECTION_DOT_RADIUS_PERIOD_SECONDS);

    (1.0 + PRE_CONNECTION_DOT_RADIUS_PULSE_SCALE * pulse);

float connectionRevealScale(float frame) {
  float revealAmount = clamp(uConnectionRevealAmount, 0.0, 1.0);
  float easedReveal = revealAmount * revealAmount * (3.0 - 2.0 * revealAmount);

  return mix(preConnectionDotRadius(frame), 1.0, easedReveal);

float horizonOrbScale(float frame) {
  float userSpeaking = clamp(uUserSpeakingScale, 0.0, 1.0);
  float micLevel = clamp(uMicLevel, 0.0, 1.0);
  float baseScale = 1.0 - userSpeaking * USER_SPEAKING_BASE_SCALE_REDUCTION;
  float pulseScale = userSpeaking * micLevel * USER_SPEAKING_MIC_PULSE_SCALE;
  float voiceScale = max(baseScale + pulseScale, MIN_HORIZON_ORB_SCALE);

  return voiceScale * connectionRevealScale(frame);
}

vec4 renderPreConnectionDot(vec2 sdfPosition, float frame) {
  float dotDistance = length(sdfPosition) - preConnectionDotRadius(frame);

  float dotShape = 1.0 - step(0.0, dotDistance);

  return uPreConnectionDotColor * dotShape;

  float frame = uBaseShaderFrame;

// === state machine — 1:1 port of the bundle's "We" class =====================
// tuning constants (bundle: Ve)
const TUNING = {
  textureEdgeWarpSpringFrequency: 7,
  textureEdgeWarpSpringDampingRatio: .36,
  speakingTextureFlowSpeedScale: .96,
  textureFlowAttackDuration: .055,
  textureFlowReleaseDuration: .16,
  speakingWatercolorDriftAttackDuration: .07,
  speakingWatercolorDriftReleaseDuration: .22,
  minimumWaveMotionSpeed: .72,
  idleWaveMotionSpeed: 1.15,
  speakingWaveSpeedScale: .187,
  speakingSpeedBase: 1.8,
  speakingSlowEnergyScale: 4.6,
  speakingSpeedAttackDuration: .045,
  speakingSpeedReleaseDuration: .14,
  speakingSpringFrequency: 6,
  speakingSpringDampingRatio: .76,
  speakingWaveAmplitude: 1.167,
  speakingWaveAmplitudeAttackDuration: .1,
  speakingWaveAmplitudeReleaseDuration: .28,
  speakingWatercolorDriftScale: .033,
  speakingWatercolorWindScale: .1,
  speakingWatercolorWindSpeed: .65,
  listeningTextureEdgeWarpDistance: .102,
  listeningTextureNoiseScale: 2.2,
}
const WIND_RATE = [.72, 1, 1.28]   // per-layer watercolor wind rate (bundle: He)

const clamp01 = (v, lo = 0, hi = 1) => Math.min(Math.max(v, lo), hi)

// asymmetric exponential ease — attack when rising, release when falling (bundle: Be)
function easeToward(from, to, dt, attack, release) {
  const tau = to > from ? attack : release
  return from + (to - from) * (1 - Math.exp(-dt / tau))
}
// damped spring, integrated in ≤1/120s substeps (bundle: Fe)
function springToward(pos, vel, target, dt,
                      freq = TUNING.speakingSpringFrequency,
                      damp = TUNING.speakingSpringDampingRatio) {
  const w = 2 * Math.PI * freq, k = w * w, c = 2 * damp * w
  const steps = Math.max(1, Math.ceil(dt / (1 / 120))), h = dt / steps
  let p = pos, v = vel
  for (let i = 0; i < steps; i++) { const a = (target - p) * k - v * c; v += a * h; p += v * h }
  return { value: p, velocity: v }
}
// assistant loudness → 0..1 energy curve (bundle: ze)
const speakingEnergy = s => Math.pow(1 - Math.exp(-clamp01(s.assistantWaveformLevel) * 4), 1.15)
// user-speaking gate × mic level (bundle: Re)
const listeningEnergy = s => clamp01(s.userSpeakingScale) * clamp01(s.micLevel)

class Horizon {
  constructor() {
    this.T = TUNING
    // internal eased / spring state (bundle: this.k)
    this.st = {
      speakingSpeedDrive: 0, speakingBoost: 0, speakingVelocity: 0,
      waveAmplitude: 1, textureEdgeWarp: 0, textureEdgeWarpVelocity: 0,
      textureFlowBoost: 0,
      speakingWatercolorAudio: [0, 0, 0],
      speakingWatercolorPhase: [0, 2.1, 4.2],
    }
    // per-frame outputs consumed by the render loop (bundle: this.O)
    this.out = {
      waveMotionSpeed: TUNING.idleWaveMotionSpeed, waveAmplitude: 1,
      textureEdgeWarp: 0, listeningTextureNoiseScale: 1, textureFlowSpeed: 1,
      speakingWatercolorOffsets: [[0, 0], [0, 0], [0, 0]],
    }
  }

  update(s, dt) {
    const T = this.T, st = this.st, out = this.out
    const energy = speakingEnergy(s)
    const speak = clamp01(s.stateSpeak)

    // wave motion speed (bundle: ke)
    {
      st.speakingSpeedDrive = easeToward(st.speakingSpeedDrive, speak * energy, dt,
        T.speakingSpeedAttackDuration, T.speakingSpeedReleaseDuration)
      const slow = T.speakingSpeedBase + st.speakingSpeedDrive * T.speakingSlowEnergyScale
      const target = T.minimumWaveMotionSpeed + speak * st.speakingSpeedDrive * T.speakingWaveSpeedScale * slow
      const sp = springToward(out.waveMotionSpeed, st.speakingVelocity,
        Math.max(target, T.minimumWaveMotionSpeed), dt)
      out.waveMotionSpeed = T.idleWaveMotionSpeed * (1 - speak) + sp.value * speak
      st.speakingVelocity = sp.velocity
    }

    // wave amplitude (bundle: Ae)
    {
      const target = 1 - speak * energy * (1 - T.speakingWaveAmplitude)
      st.waveAmplitude = easeToward(st.waveAmplitude, target, dt,
        T.speakingWaveAmplitudeAttackDuration, T.speakingWaveAmplitudeReleaseDuration)
      out.waveAmplitude = st.waveAmplitude
    }

    // texture edge warp while listening (bundle: je)
    {
      const target = listeningEnergy(s) * T.listeningTextureEdgeWarpDistance
      const sp = springToward(st.textureEdgeWarp, st.textureEdgeWarpVelocity, target, dt,
        T.textureEdgeWarpSpringFrequency, T.textureEdgeWarpSpringDampingRatio)
      st.textureEdgeWarp = sp.value
      st.textureEdgeWarpVelocity = sp.velocity
      out.textureEdgeWarp = sp.value
    }

    // listening noise scale (bundle: Me)
    out.listeningTextureNoiseScale = 1 + listeningEnergy(s) * (T.listeningTextureNoiseScale - 1)

    // texture flow speed (bundle: Ne)
    {
      const cum = clamp01(Math.max(...s.cumulativeAudio) / 12)
      const target = speak * Math.max(s.assistantMotionLevel, cum) * T.speakingTextureFlowSpeedScale
      st.textureFlowBoost = easeToward(st.textureFlowBoost, target, dt,
        T.textureFlowAttackDuration, T.textureFlowReleaseDuration)
      out.textureFlowSpeed = 1 + st.textureFlowBoost
    }

    // speaking watercolor offsets — 3 layers drift + wind (bundle: Pe)
    {
      const audio = st.speakingWatercolorAudio
      for (let i = 0; i < audio.length; i++)
        audio[i] = easeToward(audio[i], speak * clamp01((s.cumulativeAudio[i] ?? 0) / 12), dt,
          T.speakingWatercolorDriftAttackDuration, T.speakingWatercolorDriftReleaseDuration)
      if (speak > 0) {
        const ph = st.speakingWatercolorPhase
        for (let i = 0; i < ph.length; i++)
          ph[i] += dt * speak * T.speakingWatercolorWindSpeed * WIND_RATE[i] * (1 + audio[i] * 1.5)
      }
      const [a0, a1, a2] = audio
      const [p0, p1, p2] = st.speakingWatercolorPhase
      const drift = T.speakingWatercolorDriftScale, wind = T.speakingWatercolorWindScale
      const off = out.speakingWatercolorOffsets
      off[0][0] =  a0 * drift       + Math.sin(p0)        * a0 * wind
      off[0][1] = -a1 * drift * .55 + Math.cos(p0 * .82)  * a1 * wind * .65
      off[1][0] = -a1 * drift * .75 + Math.cos(p1 * .91)  * a1 * wind * .8
      off[1][1] =  a2 * drift       + Math.sin(p1)        * a2 * wind
      off[2][0] =  a2 * drift * 1.1 + Math.sin(p2 * 1.05) * a2 * wind
      off[2][1] =  a0 * drift * .9  + Math.cos(p2)        * a0 * wind
    }

    return out
  }
}

// === jelly drag — iOS pull-to-search interaction model =======================
// Ported from -[SBHHomePullToSearchSettings setDefaultValues] (iOS 26.3
// SpringBoardHome, read out of the simulator binary):
//   • the affordance never follows the finger 1:1 — it CHASES the target with
//     a tight "tracking" spring   (trackingResponse .08s, trackingDamping .92)
//   • on release the target snaps home and a softer "settle" spring takes
//     over                        (response .47s,        dampingRatio .80)
//   • velocity hands over between the two phases for free (same spring state)
// Drag target uses the iOS scroll rubber band (FluidRubberBand.kt):
//   offset(d) = (1 − 1 / (d/range·c + 1)) · range
const JELLY = {
  baseScale: .50,        // idle orb scale — smaller at rest → bigger pull contrast
  range: .20,            // rubber-band range (asymptote), orb-radius units
  coeff: .32,            // rubber coefficient — lower = heavier (iOS scroll stock: .55)
  trackingResponse: .08, // while dragging — Apple: trackingResponse = 0.08
  trackingDamping:  .92, // while dragging — Apple: trackingDampingRatio = 0.92
  settleStiffness:  190, // release spring stiffness k (chenglou / index.html model)
  settleDamping:    .86, // release spring damping ratio ζ (b = 2ζ√k); <1 = jelly bounce
  pop: 1.02,             // press pop scale
  grow: .20,             // pull-driven whole-base growth — small at rest, swells on drag
  diagPenalty: .35,      // 45° drags get a shorter rubber range — axes pull easiest
  stretchGain: .72,      // shader directional-stretch gain (slider-controlled)
}
const jelly = {
  x: 0, y: 0, vx: 0, vy: 0,   // spring state, orb-radius units
  tx: 0, ty: 0,               // rubber-banded drag target
  sx: 0, sy: 0,               // virtual press origin (px)
  dragging: false,
  pop: 1, vPop: 0,   // press-pop spring (small, its own timeline)
  scale: 1, acc: 0,  // scale = pop × (1 + grow·pull), derived each frame
}
// diagonal drags feel harder: the rubber range shrinks toward 45° (2·|ux·uy|
// is 0 on the axes, 1 at 45°) — the omnidirectional stand-in for iOS treating
// pull-to-search as an axis gesture and ignoring the cross component
const effRange = (ux, uy) => JELLY.range * (1 - JELLY.diagPenalty * 2 * Math.abs(ux * uy))
const rubberOffset = (d, range) => (1 - 1 / (d / range * JELLY.coeff + 1)) * range
const rubberDistance = (off, range) => {  // inverse (FluidRubberBand.distance)
  const o = Math.min(off, range - 1e-5)
  return (range * o / (range - o)) / JELLY.coeff
}

cvs.addEventListener('pointerdown', e => {
  jelly.dragging = true
  const rect = cvs.getBoundingClientRect()
  const off = Math.hypot(jelly.x, jelly.y)
  if (off > 1e-4) {
    // re-grab mid-motion without a jump: place the virtual press origin so the
    // current offset maps back through the rubber-band inverse
    const d = rubberDistance(off, effRange(jelly.x / off, jelly.y / off))
    jelly.sx = e.clientX - (jelly.x / off) * d * (rect.width / 2) * JELLY.baseScale
    jelly.sy = e.clientY + (jelly.y / off) * d * (rect.height / 2) * JELLY.baseScale
  } else {
    jelly.sx = e.clientX; jelly.sy = e.clientY
  }
  jelly.tx = jelly.x; jelly.ty = jelly.y
  try { cvs.setPointerCapture(e.pointerId) } catch (_) {}
})

// move/up/cancel live on WINDOW so a release anywhere ends the drag —
// same missed-pointerup fix as index.html
window.addEventListener('pointermove', e => {
  if (!jelly.dragging) return
  if (e.buttons === 0) { jellyRelease(); return }  // button already up → the up event was missed
  const rect = cvs.getBoundingClientRect()
  // pointer delta → orb-radius units (y up), pre-divided by the base scale
  const dx = (e.clientX - jelly.sx) / (rect.width / 2) / JELLY.baseScale
  const dy = -(e.clientY - jelly.sy) / (rect.height / 2) / JELLY.baseScale
  const d = Math.hypot(dx, dy)
  if (d < 1e-5) { jelly.tx = 0; jelly.ty = 0 }
  else {
    const ux = dx / d, uy = dy / d
    const off = rubberOffset(d, effRange(ux, uy))
    jelly.tx = ux * off; jelly.ty = uy * off
  }
})
function jellyRelease() { jelly.dragging = false }   // target snaps home; the spring keeps its velocity
window.addEventListener('pointerup', jellyRelease)
window.addEventListener('pointercancel', jellyRelease)
window.addEventListener('blur', jellyRelease)

// tuning sliders — Resistance (higher = heavier drag → lower rubber coeff) and
// Stretch (shader directional-stretch gain)
const sRes = document.getElementById('sRes'), vRes = document.getElementById('vRes')
const sStr = document.getElementById('sStr'), vStr = document.getElementById('vStr')
function onRes() {

  JELLY.coeff = 0.6 - (r / 100) * 0.48        // 0.6 (light) → 0.12 (heavy)
  vRes.textContent = r
}
function onStr() {
  JELLY.stretchGain = +sStr.value / 100       // 0 .. 1.5
  vStr.textContent = JELLY.stretchGain.toFixed(2)
}
const sGrow = document.getElementById('sGrow'), vGrow = document.getElementById('vGrow')
function onGrow() {

  vGrow.textContent = JELLY.grow.toFixed(2)
}
// release spring (chenglou / index.html model): Stiffness k (higher = snappier),
// Damping ratio ζ (b = 2ζ√k; <1 overshoots and wobbles, 1 = no bounce)
const sStiff = document.getElementById('sStiff'), vStiff = document.getElementById('vStiff')
const sDmp = document.getElementById('sDmp'), vDmp = document.getElementById('vDmp')
function onStiff() {

}

}
sRes.addEventListener('input', onRes); onRes()
sStr.addEventListener('input', onStr); onStr()

sStiff.addEventListener('input', onStiff); onStiff()
sDmp.addEventListener('input', onDmp); onDmp()

// === render loop =============================================================
const hz = new Horizon()
let waveFrame = 1, baseFrame = 1, flowFrame = 1
let last = performance.now()

function frame(now) {
  const dt = Math.min((now - last) / 1000, 1 / 24)
  last = now

  // ease UI states toward their targets (~0.25s)
  snap.stateListen += (tgt.listen - snap.stateListen) * Math.min(dt / 0.25, 1)
  snap.stateSpeak  += (tgt.speak  - snap.stateSpeak)  * Math.min(dt / 0.25, 1)

  if (useMic && analyser) {
    // real mic — normalized magnitudes of the low FFT bands
    analyser.getFloatFrequencyData(freq)
    const nrm = d => { const x = 1 - Math.max(-100, Math.min(-10, d)) * -1 / 100; return Math.sqrt(x) }
    const band = (lo, hi) => { let sum = 0; for (let i = lo; i < hi; i++) sum += nrm(freq[i]); return sum / (hi - lo) }
    const lvl = band(0, 120)
    snap.assistantWaveformLevel = tgt.speak ? lvl : 0
    snap.assistantMotionLevel = tgt.speak ? lvl : 0
    snap.userSpeakingScale = tgt.listen ? 1 : 0
    snap.micLevel = lvl
    for (let i = 0; i < 4; i++) snap.cumulativeAudio[i] = tgt.speak ? band(i * 30, i * 30 + 30) * 12 : 0
  } else {
    // synthetic drive — layered sines fake a talking / listening envelope
    const t = now / 1000, s = (f, p) => 0.5 + 0.5 * Math.sin(t * f + p)
    const spk = snap.stateSpeak, lst = snap.stateListen
    const env = spk * (0.55 * s(6.2, 0) + 0.45 * s(2.7, 1.3))
    snap.assistantWaveformLevel = env
    snap.assistantMotionLevel = env * 0.8
    snap.userSpeakingScale = lst
    snap.micLevel = lst * (0.3 + 0.3 * s(3, 0))
    for (let i = 0; i < 4; i++) snap.cumulativeAudio[i] = spk * (4 + 6 * s(5 + i * 2, i)) * env
  }

  const o = hz.update(snap, dt)
  waveFrame += dt * 24 * o.waveMotionSpeed
  baseFrame += dt * 24
  flowFrame += dt * 24 * o.textureFlowSpeed

  // jelly: one continuous spring, retargeted — chases the rubber-banded pointer
  // with Apple's tight tracking spring while dragging, then settles home on the
  // softer release spring; velocity carries across the switch (fixed 4ms steps)
  {
    // dragging → Apple's tight tracking spring (response-based); released →
    // chenglou's spring parameterized by stiffness k + damping ratio ζ
    let jk, jc
    if (jelly.dragging) {
      const w = 2 * Math.PI / JELLY.trackingResponse
      jk = w * w; jc = 2 * JELLY.trackingDamping * w
    } else {
      jk = JELLY.settleStiffness; jc = 2 * JELLY.settleDamping * Math.sqrt(jk)
    }
    const gx = jelly.dragging ? jelly.tx : 0
    const gy = jelly.dragging ? jelly.ty : 0
    jelly.acc += dt
    while (jelly.acc >= .004) {
      jelly.acc -= .004
      jelly.vx += (jk * (gx - jelly.x) - jc * jelly.vx) * .004; jelly.x += jelly.vx * .004
      jelly.vy += (jk * (gy - jelly.y) - jc * jelly.vy) * .004; jelly.y += jelly.vy * .004
      // press pop only — a tiny, quick separate spring (k = 500, critical)
      const popDest = jelly.dragging ? JELLY.pop : 1
      jelly.vPop += (-500 * (jelly.pop - popDest) - 44.72 * jelly.vPop) * .004
      jelly.pop += jelly.vPop * .004
    }
    // grow follows the LIVE (spring-driven) offset, so on release it shrinks on
    // the SAME settle spring as the position — wobble and all, one timeline
    const pull = Math.min(Math.hypot(jelly.x, jelly.y) / JELLY.range, 1)
    jelly.scale = jelly.pop * (1 + JELLY.grow * pull)
  }
  { // a hard fling can overshoot outward — keep the lobe inside the canvas margin
    const jm = Math.hypot(jelly.x, jelly.y)
    if (jm > JELLY.range) { jelly.x *= JELLY.range / jm; jelly.y *= JELLY.range / jm }
  }

  // resize (dpr capped at 2)
  const dpr = Math.min(window.devicePixelRatio || 1, 2)
  const w = Math.round(cvs.clientWidth * dpr), h = Math.round(cvs.clientHeight * dpr)
  if (cvs.width !== w || cvs.height !== h) { cvs.width = w; cvs.height = h }
  // dispSide: composite runs at full device res (crisp SDF edge).
  // matSide: the heavy Horizon material shader renders into a capped FBO — its
  // output is a soft watercolor upscaled with LINEAR filtering, so dropping its
  // resolution is nearly invisible but cuts the expensive noise/voronoi pixel
  // count by ~4–6× on Retina. MAT_MAX is the perf/quality dial.
  const MAT_MAX = 448
  const dispSide = Math.min(w, h)
  const matSide = Math.min(dispSide, MAT_MAX)
  ensureFbo(matSide)

  // write UBO
  f32[OFF.waveFrame] = waveFrame
  f32[OFF.baseShaderFrame] = baseFrame
  f32[OFF.waveAmplitude] = o.waveAmplitude
  f32[OFF.textureFlowFrame] = flowFrame
  f32[OFF.textureEdgeWarp] = o.textureEdgeWarp
  f32[OFF.listeningTextureNoiseScale] = o.listeningTextureNoiseScale
  f32[OFF.wc0] = o.speakingWatercolorOffsets[0][0]; f32[OFF.wc0 + 1] = o.speakingWatercolorOffsets[0][1]
  f32[OFF.wc1] = o.speakingWatercolorOffsets[1][0]; f32[OFF.wc1 + 1] = o.speakingWatercolorOffsets[1][1]
  f32[OFF.wc2] = o.speakingWatercolorOffsets[2][0]; f32[OFF.wc2 + 1] = o.speakingWatercolorOffsets[2][1]
  u32[OFF.paletteIndex] = paletteIndex
  gl.bindBuffer(gl.UNIFORM_BUFFER, ubo)
  gl.bufferSubData(gl.UNIFORM_BUFFER, 0, uboBuf)

  // PASS 1: material → interior framebuffer (capped resolution)
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo)
  gl.viewport(0, 0, matSide, matSide)
  gl.useProgram(progMat); bindMatAttribs()
  gl.disable(gl.BLEND)
  gl.clearColor(0, 0, 0, 1); gl.clear(gl.COLOR_BUFFER_BIT)
  gl.drawArrays(gl.TRIANGLES, 0, 6)

  // PASS 2: composite the interior into an SDF circle → screen.
  // Draw into a CENTERED SQUARE viewport (side×side): vSdfPosition is −1..1, so
  // a non-square canvas would otherwise stretch the circle into an ellipse.
  gl.bindFramebuffer(gl.FRAMEBUFFER, null)
  gl.viewport((w - dispSide) / 2, (h - dispSide) / 2, dispSide, dispSide)
  gl.useProgram(progComp); bindCompAttribs()
  gl.uniform1f(CU.base, baseFrame)
  gl.uniform1f(CU.mic, snap.micLevel)
  gl.uniform1f(CU.usr, snap.userSpeakingScale)
  gl.uniform1f(CU.reveal, 1.0)   // fully connected → full-size orb
  gl.uniform1f(CU.dotVis, 0.0)   // pre-connection dot hidden
  const dot = PAL_INFO[paletteIndex].dot
  gl.uniform4f(CU.dotCol, dot[0], dot[1], dot[2], 1.0)
  gl.uniform2f(CU.jOff, jelly.x, jelly.y)
  gl.uniform1f(CU.jScale, JELLY.baseScale * jelly.scale)
  gl.uniform1f(CU.jStretch, JELLY.stretchGain)
  gl.activeTexture(gl.TEXTURE2); gl.bindTexture(gl.TEXTURE_2D, interiorTex)
  gl.enable(gl.BLEND); gl.blendFunc(gl.ONE, gl.ONE_MINUS_SRC_ALPHA)
  gl.clearColor(0, 0, 0, 0); gl.clear(gl.COLOR_BUFFER_BIT)
  gl.drawArrays(gl.TRIANGLES, 0, 6)

  requestAnimationFrame(frame)
}
requestAnimationFrame(frame)
</script>
