<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>Topics</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000;
      --tick: #fff;
      --pill: #fff;
      --text: #fff;
      --text-2: rgba(255,255,255,0.62);
      --hairline: rgba(255,255,255,0.12);
      --card-bg: #161618;
      --card-border: rgba(255,255,255,0.08);
      --card-shadow: 0 18px 50px -12px rgba(0,0,0,0.7), 0 2px 8px rgba(0,0,0,0.4);
      --card-radius: 28px;
      --sans: -apple-system, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
      --tick-right: 9%;
    }
    .icon-btn {
      position: fixed;
      top: max(16px, env(safe-area-inset-top)); right: 16px;
      width: 40px; height: 40px;
      border: none; border-radius: 50%;
      background: var(--card-bg);
      -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
      color: var(--text); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 10; padding: 0; -webkit-tap-highlight-color: transparent;
      transition: opacity 200ms ease;
    }
    .icon-btn.is-off { opacity: 0.45; }

    html, body { height: 100%; overflow: hidden; overscroll-behavior: none; }
    body { font-family: var(--sans); background: var(--bg); transition: background-color 400ms ease; }

    /* 整屏都是触摸区：指针的竖直位置决定选中哪根刻度 */
    .slider {
      position: fixed;
      inset: 0;
      z-index: 3;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
    }

    .track { position: fixed; inset: 0; pointer-events: none; }

    /* 单条刻度：右端对齐、向左生长（active 长线指向左边卡片）；top 由 JS 固定摆放 */
    .tick {
      position: absolute;
      right: var(--tick-right);
      top: 0;
      width: 16px;                     /* = LINE_BASE */
      height: 2px;
      background: var(--tick);
      border-radius: 1px;
      transform-origin: right center;
    }

    /* 卡片层（整屏，不挡触摸） */
    .card-wrap { position: fixed; inset: 0; pointer-events: none; }

    /* 卡片 = 会变形的形状：宽/高/圆角/位置由 JS spring 驱动；颜色 400ms 过渡，无辉光 */
    .card {
      position: fixed;
      overflow: hidden;
      background: transparent;
      transition: background-color 400ms ease;
      will-change: width, height, border-radius, left, top;
      pointer-events: none;
    }
    /* 药丸层：指针态颜色（与刻度同色），随 ct 淡出 */
    .card-pill {
      position: absolute; inset: 0; border-radius: inherit;
      background: var(--pill); pointer-events: none;
      transition: background-color 400ms ease;
    }
    /* 卡片表面：纯黑冷峻——深色不透 + 内部微渐变 + 柔阴影（无描边） */
    .card-surface {
      position: absolute; inset: 0; border-radius: inherit;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.045) 0%, rgba(255,255,255,0) 38%),
        var(--card-bg);
      box-shadow: var(--card-shadow);
      opacity: 0; pointer-events: none;
      transition: background-color 400ms ease, box-shadow 400ms ease;
    }

    .card-content {
      position: absolute;
      inset: 0;
      opacity: 0;
      will-change: opacity, filter;
    }

    .card-head {
      position: absolute;
      top: 17px; left: 20px; right: 20px;
      display: flex; align-items: center; gap: 6px;
    }
    .card-counter { font-size: 11px; font-weight: 700; letter-spacing: 0.6px; color: var(--text); font-variant-numeric: tabular-nums; }
    .card-total   { font-size: 11px; font-weight: 500; letter-spacing: 0.6px; color: rgba(255,255,255,0.40); }

    .card-body { position: absolute; left: 0; right: 0; top: 41px; bottom: 16px; transition: opacity 140ms ease, filter 140ms ease; will-change: opacity, filter; }
    .slider.is-fast .card-body { opacity: 0; filter: blur(8px); }
    .card-layer {
      position: absolute; inset: 0; padding: 0 20px;
      opacity: 0; transition: opacity 0.2s ease; will-change: opacity;
    }
    .card-layer.is-active { opacity: 1; }
    .card-title { font-size: 18px; font-weight: 650; line-height: 1.18; letter-spacing: -0.022em; color: var(--text); margin-bottom: 6px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-desc  { font-size: 13.5px; font-weight: 400; line-height: 1.38; letter-spacing: -0.005em; color: rgba(255,255,255,0.52);
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>
<body>
  <div class="slider" id="slider" role="slider" aria-label="Topic" aria-valuemin="1" aria-valuemax="20" aria-valuenow="1" aria-valuetext="Why the Sky Is Blue" tabindex="0">
    <div class="track" id="track"></div>
    <div class="card-wrap">
      <div class="card" id="card">
        <div class="card-pill" id="cardPill"></div>
        <div class="card-surface" id="cardSurface"></div>
        <div class="card-content" id="cardContent">
          <div class="card-head">
            <div class="card-counter" id="counter"></div>
            <span class="card-total">/ 20</span>
          </div>
          <div class="card-body">
            <div class="card-layer" id="layerA"><div class="card-title"></div><div class="card-desc"></div></div>
            <div class="card-layer" id="layerB"><div class="card-title"></div><div class="card-desc"></div></div>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
/* SpringNumber — 每位数字独立弹簧滚动（来自仓库 spring-number.js，加 minDigits 补零） */
class SpringNumber {
  constructor(container, options = {}) {
    this.container = typeof container === 'string' ? document.querySelector(container) : container
    this.options = { value: 0, k: 120, b: 16, digitHeight: 72, digitWidth: 36, fontSize: 56, fontWeight: 300, color: '#fff', minDigits: 0, ...options }
    this.digits = []; this.animatedUntil = null; this.rafId = null; this.msPerStep = 4
    this.currentValue = this.options.value
    this.container.style.display = 'flex'
    this._injectStyles(); this._updateDisplay(this.options.value, false)
  }
  _injectStyles() {
    if (document.getElementById('spring-number-styles')) return
    const style = document.createElement('style'); style.id = 'spring-number-styles'
    style.textContent = '.spring-digit{overflow:hidden;position:relative}.spring-digit-wrapper{display:flex;flex-direction:column;position:absolute;top:0;left:0;width:100%;will-change:transform,filter,opacity}.spring-digit-wrapper span{display:flex;align-items:center;justify-content:center;font-variant-numeric:tabular-nums}'
    document.head.appendChild(style)
  }
  _spring(pos, k = this.options.k, b = this.options.b) { return { pos, dest: pos, v: 0, k, b } }
  _springStep(s) { const t = this.msPerStep / 1000; const a = -s.k * (s.pos - s.dest) - s.b * s.v; s.v += a * t; s.pos += s.v * t }
  _springIsDone(s) { return Math.abs(s.v) < 0.3 && Math.abs(s.dest - s.pos) < 0.3 }
  _createDigits(count) {
    this.container.innerHTML = ''; this.digits = []
    const { digitHeight, digitWidth, fontSize, fontWeight, color } = this.options
    for (let i = 0; i < count; i++) {
      const digitEl = document.createElement('div'); digitEl.className = 'spring-digit'
      digitEl.style.width = digitWidth + 'px'; digitEl.style.height = digitHeight + 'px'
      const wrapper = document.createElement('div'); wrapper.className = 'spring-digit-wrapper'
      for (let n = 0; n <= 9; n++) {
        const span = document.createElement('span'); span.textContent = n
        span.style.height = digitHeight + 'px'; span.style.fontSize = fontSize + 'px'; span.style.fontWeight = fontWeight; span.style.color = color
        wrapper.appendChild(span)
      }
      digitEl.appendChild(wrapper); this.container.appendChild(digitEl)
      this.digits.push({ wrapper, y: this._spring(0), opacity: this._spring(1, 200, 25) })
    }
  }
  _paint(d) {
    const blur = Math.min(Math.abs(d.y.v) / 600, 5)
    d.wrapper.style.transform = 'translateY(' + d.y.pos + 'px)'
    d.wrapper.style.filter = blur > 0.1 ? 'blur(' + blur + 'px)' : 'none'
    d.wrapper.style.opacity = Math.max(0, Math.min(1, d.opacity.pos))
  }
  _render = (now) => {
    if (this.animatedUntil === null) this.animatedUntil = now
    const steps = Math.floor((now - this.animatedUntil) / this.msPerStep)
    this.animatedUntil += steps * this.msPerStep
    let going = false
    for (const d of this.digits) {
      for (let i = 0; i < steps; i++) { this._springStep(d.y); this._springStep(d.opacity) }
      if (this._springIsDone(d.y)) { d.y.pos = d.y.dest; d.y.v = 0 } else going = true
      if (this._springIsDone(d.opacity)) { d.opacity.pos = d.opacity.dest; d.opacity.v = 0 } else going = true
      this._paint(d)
    }
    if (going) this.rafId = requestAnimationFrame(this._render)
    else { this.rafId = null; this.animatedUntil = null }
  }
  _scheduleRender() { if (this.rafId === null) this.rafId = requestAnimationFrame(this._render) }
  _setDigit(index, targetDigit, instant) {
    const d = this.digits[index]; if (!d) return
    const targetY = -targetDigit * this.options.digitHeight
    if (instant) { d.y.dest = targetY; d.opacity.dest = 1; this._scheduleRender(); return }
    if (Math.abs(d.y.dest - targetY) < 0.1) {
      d.y.dest = targetY - this.options.digitHeight * 0.35; d.opacity.dest = 0.7; this._scheduleRender()
      setTimeout(() => { d.y.dest = targetY; d.opacity.dest = 1; this._scheduleRender() }, 70); return
    }
    d.opacity.dest = 0.3
    setTimeout(() => { d.y.dest = targetY; d.opacity.dest = 1; this._scheduleRender() }, 80)
    this._scheduleRender()
  }
  _updateDisplay(num, animate = true, instant = false) {
    let str = String(num)
    if (this.options.minDigits) str = str.padStart(this.options.minDigits, '0')
    if (str.length !== this.digits.length) {
      this._createDigits(str.length)
      for (let i = 0; i < str.length; i++) {
        const targetY = -parseInt(str[i]) * this.options.digitHeight
        if (animate) { this.digits[i].y.pos = targetY + this.options.digitHeight; this.digits[i].y.dest = targetY; this.digits[i].opacity.pos = 0; this.digits[i].opacity.dest = 1 }
        else { this.digits[i].y.pos = targetY; this.digits[i].y.dest = targetY }
      }
      for (const d of this.digits) this._paint(d)
      if (animate) this._scheduleRender()
    } else if (!animate) { for (const d of this.digits) this._paint(d) }
    if (animate) { for (let i = 0; i < str.length; i++) this._setDigit(i, parseInt(str[i]), instant) }
  }
  setValue(value, instant = false) { this.currentValue = value; this._updateDisplay(value, true, instant) }
}
</script>
<script>
'use strict'

// ============================================
// 数据：一段很长对话被切成的 20 个 topic
// ============================================
const TOPICS = [
  { title: 'Why the Sky Is Blue',   desc: 'Air scatters short blue wavelengths far more than red.' },
  { title: 'The Antikythera Device', desc: 'A 2,000-year-old Greek computer that predicted eclipses.' },
  { title: 'Octopus Minds',         desc: 'Two-thirds of their neurons live out in their arms.' },
  { title: 'The Fermi Paradox',     desc: 'If the universe is so vast, where is everybody?' },
  { title: 'Tardigrades',           desc: 'They can survive the raw vacuum of open space.' },
  { title: 'Honey Never Spoils',    desc: 'Edible jars have been found in Egyptian tombs.' },
  { title: 'The Mpemba Effect',     desc: 'Hot water can sometimes freeze faster than cold.' },
  { title: 'Mantis Shrimp Vision',  desc: 'They see with sixteen types of color receptor.' },
  { title: 'Phantom Traffic Jams',  desc: 'One brake tap can ripple backward for miles.' },
  { title: 'The Golden Record',     desc: 'A map home, now drifting beyond the solar system.' },
  { title: 'Why We Dream',          desc: 'The brain may rehearse for threats that never come.' },
  { title: 'Bioluminescence',       desc: 'Most of the deep ocean glows with living light.' },
  { title: 'The Placebo Effect',    desc: 'Belief alone can trigger real physical healing.' },
  { title: 'The Great Filter',      desc: 'Maybe life’s hardest step is still ahead of us.' },
  { title: 'Baader–Meinhof',        desc: 'Notice a thing once and it’s suddenly everywhere.' },
  { title: 'Spaghettification',     desc: 'Fall into a black hole and you’re stretched thin.' },
  { title: 'Wild Sourdough',        desc: 'Each loaf carries the yeast of the room it grew in.' },
  { title: 'Why Cats Purr',         desc: 'The frequency may help bone and tissue heal.' },
  { title: 'The Library of Babel',  desc: 'Every possible book, lost on infinite shelves.' },
  { title: 'Deep Time',             desc: 'We’re a thin film on four billion years of Earth.' },
]
const N = TOPICS.length

// ============================================
// 配置
// ============================================
const LINE_BASE   = 16, LINE_ACTIVE = 34, FALLOFF = 2.5   // 刻度视觉（更小）
const POINTER_W   = LINE_ACTIVE
const POINTER_H   = 2 * 1.6
const POINTER_R   = POINTER_H / 2
const CARD_H      = 146, CARD_RADIUS = 24
const CARD_K_IN   = 240, CARD_B_IN = 26     // 出现：略回弹
const CARD_K_OUT  = 540, CARD_B_OUT = 47    // 收回：更快 + 临界阻尼（不回弹）
const CY_K        = 250, CY_B = 28          // 卡片竖直跟手弹簧（带一点点拖拽延迟，不过头）
const CARD_LINGER = 1400
const TICK_X_GAP  = 22
const MAX_SPACING = 34                       // 刻度最大间距
const DRAG_SLOP   = 8

const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v))
const lerp = (a, b, t) => a + (b - a) * t

// ============================================
// DOM + 刻度
// ============================================
const track = document.getElementById('track')
const slider = document.getElementById('slider')
const card = document.getElementById('card')
const cardContent = document.getElementById('cardContent')
const cardSurface = document.getElementById('cardSurface')
const cardPill = document.getElementById('cardPill')
const layerA = document.getElementById('layerA')
const layerB = document.getElementById('layerB')
const counter = document.getElementById('counter')
const counterNum = new SpringNumber(counter, { value: 1, minDigits: 2, k: 130, b: 16, digitHeight: 18, digitWidth: 8, fontSize: 13, fontWeight: 600, color: 'currentColor' })

const ticks = []
for (let i = 0; i < N; i++) {
  const el = document.createElement('div')
  el.className = 'tick'
  track.appendChild(el)
  ticks.push(el)
}

// ============================================
// 触觉反馈
// ============================================
const supportsVibrate = 'vibrate' in navigator
const hapticSwitch = document.createElement('label')
hapticSwitch.setAttribute('aria-hidden', 'true')
hapticSwitch.style.cssText = 'position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;pointer-events:none;'
{
  const input = document.createElement('input')
  input.type = 'checkbox'
  input.setAttribute('switch', '')
  hapticSwitch.appendChild(input)
  document.body.appendChild(hapticSwitch)
}
// 轻音反馈：手机端没有 haptic，滑过每根刻度播一声短促的 "tick"
let audioCtx = null
function ensureAudio() {
  if (!audioCtx) {
    const AC = window.AudioContext || window.webkitAudioContext
    if (AC) audioCtx = new AC()
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume()
}
function tickSound(strong) {
  if (window.soundMuted) return
  if (!audioCtx || audioCtx.state !== 'running') return
  const now = audioCtx.currentTime
  const osc = audioCtx.createOscillator()
  const gain = audioCtx.createGain()
  osc.type = 'sine'
  // 端点更高更明显，普通刻度更轻
  osc.frequency.setValueAtTime(strong ? 1100 : 760, now)
  osc.frequency.exponentialRampToValueAtTime(strong ? 660 : 520, now + 0.03)
  const peak = strong ? 0.18 : 0.09
  gain.gain.setValueAtTime(0.0001, now)
  gain.gain.exponentialRampToValueAtTime(peak, now + 0.004)
  gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.055)
  osc.connect(gain).connect(audioCtx.destination)
  osc.start(now)
  osc.stop(now + 0.06)
}

function haptic(strong) {
  if (supportsVibrate) navigator.vibrate(strong ? 24 : 8)
  else hapticSwitch.click()
  tickSound(strong)   // 同步播一声轻音（无 haptic 的手机端也有反馈）
}

// ============================================
// 卡片文字：双层交叉淡入
// ============================================
let frontLayer = layerA
let backLayer = layerB
function fillLayer(layer, idx) {
  const t = TOPICS[idx]
  layer.children[0].textContent = t.title
  layer.children[1].textContent = t.desc
}
// 计数器/aria —— 始终实时更新
function updateChrome(idx) {
  counterNum.setValue(idx + 1, true)
  slider.setAttribute('aria-valuenow', String(idx + 1))
  slider.setAttribute('aria-valuetext', TOPICS[idx].title)
}
// 标题/描述文字 —— 快滑时延迟、停下才提交（避免残影）
let committedIdx = 0
let commitTimer = null
let lastChangeT = -1e9
function setFast(on) { slider.classList.toggle('is-fast', on) }
function commitText(idx) {
  if (idx === committedIdx) return
  committedIdx = idx
  fillLayer(backLayer, idx)
  backLayer.classList.add('is-active')
  frontLayer.classList.remove('is-active')
  const tmp = frontLayer; frontLayer = backLayer; backLayer = tmp
}
function commitNow() { clearTimeout(commitTimer); commitText(activeIndex); setFast(false) }

// ============================================
// 布局：固定显示全部刻度（竖直居中）+ 卡片，整组水平居中
// ============================================
let centerY = window.innerHeight / 2
let rulerX = 0, cardX = 0, cardW = 300, spacing = 30, rulerTop = 0

function layout() {
  const vw = window.innerWidth, vh = window.innerHeight
  centerY = vh / 2
  cardW = clamp(vw * 0.6, 210, 300)
  const groupW = cardW + TICK_X_GAP + LINE_ACTIVE
  const groupLeft = Math.max(12, (vw - groupW) / 2)
  cardX = groupLeft                                  // 卡片在左
  rulerX = groupLeft + cardW + TICK_X_GAP            // 标尺在右
  spacing = Math.min(MAX_SPACING, (vh * 0.78) / (N - 1))   // 全部塞进 78% 高度
  rulerTop = centerY - (N - 1) * spacing / 2
  // 刻度右端对齐到标尺列右缘，向左生长
  document.documentElement.style.setProperty('--tick-right', (vw - (rulerX + LINE_ACTIVE)) + 'px')
  for (let i = 0; i < N; i++) ticks[i].style.top = (rulerTop + i * spacing) + 'px'
  applyCardGeom()
  drawTicks()
}

// ============================================
// 选择：sel = 连续选择位置（指针映射而来）
// ============================================
let sel = 0
let activeIndex = 0

function drawTicks() {
  for (let i = 0; i < N; i++) {
    const d = Math.abs(i - sel)
    const t = Math.max(0, 1 - d / FALLOFF)
    const e = t * t * (3 - 2 * t)
    const sx = (LINE_BASE + (LINE_ACTIVE - LINE_BASE) * e) / LINE_BASE
    const sy = 1 + 0.6 * e
    ticks[i].style.transform = `scaleX(${sx}) scaleY(${sy})`
    ticks[i].style.opacity = 0.18 + 0.82 * e
  }
}
function setSel(s) {
  sel = clamp(s, 0, N - 1)
  drawTicks()
  const idx = clamp(Math.round(sel), 0, N - 1)
  if (idx !== activeIndex) {
    const now = performance.now()
    const fast = (now - lastChangeT) < 70     // 连切间隔 < 70ms = 快滑
    lastChangeT = now
    activeIndex = idx
    haptic(idx === 0 || idx === N - 1)
    updateChrome(idx)
    if (fast) {
      setFast(true)                           // 文字先模糊
      clearTimeout(commitTimer)
      commitTimer = setTimeout(commitNow, 110)  // 停下来才提交清晰文字
    } else {
      commitNow()                             // 慢切 → 立即提交，不模糊
    }
  }
}
function activeTickY() { return rulerTop + activeIndex * spacing }
function selY() { return rulerTop + sel * spacing }   // 连续选择位置的 Y（卡片跟手用）
function selFromY(clientY) { return clamp((clientY - rulerTop) / spacing, 0, N - 1) }

// ============================================
// 卡片：从 active 刻度变形（spring）+ 竖直跟手（spring）
// ============================================
let ct = 0, ctv = 0, ctDest = 0
let cy = 0, cyv = 0, cyDest = 0
let cardK = CARD_K_IN, cardB = CARD_B_IN
let cardRaf = null, cardLast = 0
let hideTimer = null

function applyCardGeom() {
  const hgt = lerp(POINTER_H, CARD_H, ct)
  // 按当前高度夹取：药丸态(矮)几乎不夹、精确贴刻度；卡片态(高)才夹住不出屏
  const c = clamp(cy, hgt / 2 + 12, window.innerHeight - hgt / 2 - 12)
  card.style.left = lerp(rulerX, cardX, ct) + 'px'
  card.style.top = (c - hgt / 2) + 'px'
  card.style.width = lerp(POINTER_W, cardW, ct) + 'px'
  card.style.height = hgt + 'px'
  card.style.borderRadius = lerp(POINTER_R, CARD_RADIUS, ct) + 'px'
  cardSurface.style.opacity = clamp(ct * 1.3, 0, 1)       // 卡片色随 ct 淡入
  cardPill.style.opacity = clamp(1 - ct * 1.3, 0, 1)      // 药丸色随 ct 淡出
  const cp = clamp((ct - 0.55) / 0.4, 0, 1)
  cardContent.style.opacity = cp
  cardContent.style.filter = `blur(${(1 - cp) * 8}px)`
}
function cardFrame(now) {
  cardRaf = null
  let dt = (now - cardLast) / 1000
  cardLast = now
  if (dt > 1 / 30) dt = 1 / 30
  if (dt <= 0) dt = 1 / 60
  const h = dt / 4
  for (let i = 0; i < 4; i++) {
    ctv += (-cardK * (ct - ctDest) - cardB * ctv) * h
    ct += ctv * h
    cyv += (-CY_K * (cy - cyDest) - CY_B * cyv) * h
    cy += cyv * h
  }
  applyCardGeom()
  const done = Math.abs(ct - ctDest) < 0.0004 && Math.abs(ctv) < 0.0006
            && Math.abs(cy - cyDest) < 0.3 && Math.abs(cyv) < 0.5
  if (done) {
    ct = ctDest; ctv = 0; cy = cyDest; cyv = 0; applyCardGeom()
  } else {
    cardRaf = requestAnimationFrame(cardFrame)
  }
}
function startCardSpring() {
  if (cardRaf == null) { cardLast = performance.now(); cardRaf = requestAnimationFrame(cardFrame) }
}
function setCardTarget(d) {
  ctDest = d
  if (d > 0.5) { cardK = CARD_K_IN; cardB = CARD_B_IN }
  else { cardK = CARD_K_OUT; cardB = CARD_B_OUT }
}
function showCard() { clearTimeout(hideTimer); setCardTarget(1); startCardSpring() }
function hideCard() { setCardTarget(0); startCardSpring() }
function scheduleHide() { clearTimeout(hideTimer); hideTimer = setTimeout(hideCard, CARD_LINGER) }

// ============================================
// 交互：指针指到哪根 = active；卡片贴着 active 刻度，松手 linger 后收回
// ============================================
let isInteracting = false   // 指针是否按下
let hasCommittedDrag = false
let pressY = 0
let lastY = 0
let wasShownOnPress = false  // 按下瞬间卡片是否已展开（用于「点空白收回」）

slider.addEventListener('pointerdown', e => {
  slider.setPointerCapture(e.pointerId)
  ensureAudio()
  isInteracting = true
  hasCommittedDrag = e.pointerType === 'mouse'
  pressY = e.clientY
  lastY = e.clientY
  wasShownOnPress = ctDest > 0.5            // 卡片此刻是否展开
  clearTimeout(hideTimer)
  slider.classList.add('is-scrubbing')
  if (hasCommittedDrag) setSel(selFromY(e.clientY))
  cyDest = selY()                     // 卡片跟着手指连续位置（软弹簧 → 慢半拍拖拽感）
  showCard()
})
slider.addEventListener('pointermove', e => {
  if (!isInteracting) return
  lastY = e.clientY
  if (!hasCommittedDrag && Math.abs(e.clientY - pressY) >= DRAG_SLOP) hasCommittedDrag = true
  if (hasCommittedDrag) setSel(selFromY(e.clientY))     // 选中跟着指针
  cyDest = selY()                     // 卡片连续跟手，弹簧带出 stagger 延迟
  startCardSpring()
})
function endInteract() {
  if (!isInteracting) return
  isInteracting = false
  slider.classList.remove('is-scrubbing')
  // 卡片已展开 + 这次只是轻点（没拖动）→ 点空白收回
  if (wasShownOnPress && !hasCommittedDrag) { hideCard(); return }
  if (!hasCommittedDrag) setSel(selFromY(lastY))   // 轻点也能选，但不在按下瞬间误跳
  setSel(activeIndex)             // 吸附到整刻度
  commitNow()
  cyDest = activeTickY()
  startCardSpring()
  scheduleHide()                  // 松手 linger 后自动收回
}
slider.addEventListener('pointerup', endInteract)
slider.addEventListener('pointercancel', endInteract)

// ============================================
// 桌面：滚轮选择 + 方向键
// ============================================
const WHEEL_SEL = 0.012
let wheelStopTimer = null
slider.addEventListener('wheel', e => {
  e.preventDefault()
  ensureAudio()
  clearTimeout(hideTimer)
  slider.classList.add('is-scrubbing')
  let d = e.deltaY
  if (e.deltaMode === 1) d *= 16
  else if (e.deltaMode === 2) d *= window.innerHeight
  setSel(sel + d * WHEEL_SEL)
  cyDest = activeTickY()
  showCard()
  startCardSpring()
  clearTimeout(wheelStopTimer)
  wheelStopTimer = setTimeout(() => {
    setSel(activeIndex)
    commitNow()
    slider.classList.remove('is-scrubbing')
    cyDest = activeTickY()
    startCardSpring()
    scheduleHide()
  }, 140)
}, { passive: false })

window.addEventListener('keydown', e => {
  let dir = 0
  if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') dir = -1
  else if (e.key === 'ArrowDown' || e.key === 'ArrowRight') dir = 1
  else return
  e.preventDefault()
  ensureAudio()
  clearTimeout(hideTimer)
  slider.classList.add('is-scrubbing')
  setSel(clamp(activeIndex + dir, 0, N - 1))
  slider.classList.remove('is-scrubbing')
  cyDest = activeTickY()
  showCard()
  startCardSpring()
  scheduleHide()
})

// ============================================
// 自适应
// ============================================
window.addEventListener('resize', () => {
  layout()
  if (!isInteracting) { cy = cyDest = activeTickY(); applyCardGeom() }
})

// ============================================
// 初始：选中第 1 个 topic，卡片收起（贴在该刻度）
// ============================================
layout()
activeIndex = 0
sel = 0
fillLayer(frontLayer, 0)
frontLayer.classList.add('is-active')
cy = cyDest = activeTickY()
applyCardGeom()
drawTicks()
</script>

  <button class="icon-btn" id="muteToggle" aria-label="Toggle sound"></button>
  <script>
    (function () {
      const ON  = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4.7 6.5 8.5H3v7h3.5L11 19.3z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18.5 5.5a9 9 0 0 1 0 13"/></svg>'
      const OFF = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4.7 6.5 8.5H3v7h3.5L11 19.3z"/><path d="m16 9 5 6"/><path d="m21 9-5 6"/></svg>'
      const btn = document.getElementById('muteToggle')
      function apply(muted) {
        window.soundMuted = muted
        btn.classList.toggle('is-off', muted)
        btn.innerHTML = muted ? OFF : ON
        btn.setAttribute('aria-pressed', String(muted))
        try { localStorage.setItem('topics-muted', muted ? '1' : '0') } catch (e) {}
      }
      let saved = null
      try { saved = localStorage.getItem('topics-muted') } catch (e) {}
      apply(saved === '1')   // 默认开声，仅当手动静音过才静音
      btn.addEventListener('click', function (e) { e.stopPropagation(); apply(!window.soundMuted) })
    })()
  </script>
