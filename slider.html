<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>Topics</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000;
      --tick: #fff;
      --pill: #fff;
      --text: #fff;
      --text-2: rgba(255,255,255,0.62);
      --hairline: rgba(255,255,255,0.12);
      --card-bg: rgba(118,118,128,0.24);
      --card-border: transparent;
      --card-shadow: 0 14px 36px rgba(0,0,0,0.25);
      --card-radius: 28px;
      --sans: -apple-system, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
      --tick-x: 9%;
    }
    body.light {
      --bg: #ffffff;
      --tick: #1c1c1e;
      --pill: #1c1c1e;
      --text: #1c1c1e;
      --text-2: rgba(0,0,0,0.55);
      --hairline: rgba(0,0,0,0.12);
      --card-bg: #ffffff;
      --card-border: rgba(0,0,0,0.06);
      --card-shadow: 0 12px 30px rgba(0,0,0,0.10);
    }
    .theme-toggle {
      position: fixed;
      top: max(16px, env(safe-area-inset-top)); right: 16px;
      width: 40px; height: 40px;
      border: none; border-radius: 50%;
      background: var(--card-bg);
      -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
      color: var(--text); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 10; padding: 0; -webkit-tap-highlight-color: transparent;
      transition: background-color 400ms ease, color 400ms ease;
    }

    html, body { height: 100%; overflow: hidden; overscroll-behavior: none; }
    body { font-family: var(--sans); background: var(--bg); transition: background-color 400ms ease; }

    /* 整屏都是触摸区：指针的竖直位置决定选中哪根刻度 */
    .slider {
      position: fixed;
      inset: 0;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
    }

    .track { position: fixed; inset: 0; }

    /* 单条刻度：top 由 JS 固定摆放；scaleX/scaleY 表示选中强弱 */
    .tick {
      position: absolute;
      left: var(--tick-x);
      top: 0;
      width: 22px;                     /* = LINE_BASE */
      height: 2px;
      background: var(--tick);
      border-radius: 1px;
      transform-origin: left center;
    }

    /* 卡片层（整屏，不挡触摸） */
    .card-wrap { position: fixed; inset: 0; pointer-events: none; }

    /* 卡片 = 会变形的形状：宽/高/圆角/位置由 JS spring 驱动；颜色 400ms 过渡，无辉光 */
    .card {
      position: fixed;
      overflow: hidden;
      background: var(--pill);         /* 指针态：刻度色药丸 */
      transition: background-color 400ms ease, box-shadow 400ms ease;
      will-change: width, height, border-radius, left, top;
      border: 1px solid var(--card-border);
      pointer-events: none;
    }
    .card.card-on {                    /* 卡片态：深灰面板 */
      background: var(--card-bg);
      -webkit-backdrop-filter: blur(24px) saturate(1.3);
              backdrop-filter: blur(24px) saturate(1.3);
      box-shadow: var(--card-shadow);
    }

    .card-content {
      position: absolute;
      inset: 0;
      opacity: 0;
      will-change: opacity, filter;
    }

    .card-head {
      position: absolute;
      top: 22px; left: 24px; right: 24px;
      display: flex; align-items: baseline; gap: 5px;
    }
    .card-counter { font-size: 13px; font-weight: 600; letter-spacing: 0.5px; color: var(--text); font-variant-numeric: tabular-nums; }
    .card-total   { font-size: 13px; font-weight: 500; letter-spacing: 0.5px; color: var(--text-2); }

    .card-body { position: absolute; left: 0; right: 0; top: 54px; bottom: 38px; }
    .card-layer {
      position: absolute; inset: 0; padding: 0 24px;
      opacity: 0; transition: opacity 0.2s ease; will-change: opacity;
    }
    .card-layer.is-active { opacity: 1; }
    .card-title { font-size: 20px; font-weight: 600; line-height: 1.22; letter-spacing: -0.02em; color: var(--text); margin-bottom: 8px; }
    .card-desc  { font-size: 15px; font-weight: 400; line-height: 1.45; color: var(--text-2); }

    .card-progress {
      position: absolute; left: 24px; right: 24px; bottom: 22px;
      height: 3px; border-radius: 2px; background: var(--hairline); overflow: hidden;
    }
    .card-progress-fill {
      height: 100%; width: 0%; border-radius: 2px; background: var(--text);
      transition: width 0.3s cubic-bezier(0.2, 0.9, 0.3, 1);
    }
    .slider.is-scrubbing .card-progress-fill { transition: none; }
  </style>
</head>
<body>
  <div class="slider" id="slider" role="slider" aria-label="Topic" aria-valuemin="1" aria-valuemax="20" aria-valuenow="1" aria-valuetext="Why the Sky Is Blue" tabindex="0">
    <div class="track" id="track"></div>
    <div class="card-wrap">
      <div class="card" id="card">
        <div class="card-content" id="cardContent">
          <div class="card-head">
            <span class="card-counter" id="counter">01</span>
            <span class="card-total">/ 20</span>
          </div>
          <div class="card-body">
            <div class="card-layer" id="layerA"><div class="card-title"></div><div class="card-desc"></div></div>
            <div class="card-layer" id="layerB"><div class="card-title"></div><div class="card-desc"></div></div>
          </div>
          <div class="card-progress"><div class="card-progress-fill" id="progressFill"></div></div>
        </div>
      </div>
    </div>
  </div>

<script>
'use strict'

// ============================================
// 数据：一段很长对话被切成的 20 个 topic
// ============================================
const TOPICS = [
  { title: 'Why the Sky Is Blue',   desc: 'Air scatters short blue wavelengths far more than red.' },
  { title: 'The Antikythera Device', desc: 'A 2,000-year-old Greek computer that predicted eclipses.' },
  { title: 'Octopus Minds',         desc: 'Two-thirds of their neurons live out in their arms.' },
  { title: 'The Fermi Paradox',     desc: 'If the universe is so vast, where is everybody?' },
  { title: 'Tardigrades',           desc: 'They can survive the raw vacuum of open space.' },
  { title: 'Honey Never Spoils',    desc: 'Edible jars have been found in Egyptian tombs.' },
  { title: 'The Mpemba Effect',     desc: 'Hot water can sometimes freeze faster than cold.' },
  { title: 'Mantis Shrimp Vision',  desc: 'They see with sixteen types of color receptor.' },
  { title: 'Phantom Traffic Jams',  desc: 'One brake tap can ripple backward for miles.' },
  { title: 'The Golden Record',     desc: 'A map home, now drifting beyond the solar system.' },
  { title: 'Why We Dream',          desc: 'The brain may rehearse for threats that never come.' },
  { title: 'Bioluminescence',       desc: 'Most of the deep ocean glows with living light.' },
  { title: 'The Placebo Effect',    desc: 'Belief alone can trigger real physical healing.' },
  { title: 'The Great Filter',      desc: 'Maybe life’s hardest step is still ahead of us.' },
  { title: 'Baader–Meinhof',        desc: 'Notice a thing once and it’s suddenly everywhere.' },
  { title: 'Spaghettification',     desc: 'Fall into a black hole and you’re stretched thin.' },
  { title: 'Wild Sourdough',        desc: 'Each loaf carries the yeast of the room it grew in.' },
  { title: 'Why Cats Purr',         desc: 'The frequency may help bone and tissue heal.' },
  { title: 'The Library of Babel',  desc: 'Every possible book, lost on infinite shelves.' },
  { title: 'Deep Time',             desc: 'We’re a thin film on four billion years of Earth.' },
]
const N = TOPICS.length

// ============================================
// 配置
// ============================================
const LINE_BASE   = 22, LINE_ACTIVE = 48, FALLOFF = 2.5   // 刻度视觉
const POINTER_W   = LINE_ACTIVE
const POINTER_H   = 2 * 1.6
const POINTER_R   = POINTER_H / 2
const CARD_H      = 200, CARD_RADIUS = 28
const CARD_K_IN   = 240, CARD_B_IN = 26     // 出现：略回弹
const CARD_K_OUT  = 360, CARD_B_OUT = 38    // 收回：快且不回弹
const CY_K        = 320, CY_B = 32          // 卡片竖直跟手弹簧
const CARD_LINGER = 1400
const TICK_X_GAP  = 22
const MAX_SPACING = 34                       // 刻度最大间距
const DRAG_SLOP   = 8
const FINGER_OFFSET = 18

const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v))
const lerp = (a, b, t) => a + (b - a) * t

// ============================================
// DOM + 刻度
// ============================================
const track = document.getElementById('track')
const slider = document.getElementById('slider')
const card = document.getElementById('card')
const cardContent = document.getElementById('cardContent')
const layerA = document.getElementById('layerA')
const layerB = document.getElementById('layerB')
const counter = document.getElementById('counter')
const progressFill = document.getElementById('progressFill')

const ticks = []
for (let i = 0; i < N; i++) {
  const el = document.createElement('div')
  el.className = 'tick'
  track.appendChild(el)
  ticks.push(el)
}

// ============================================
// 触觉反馈
// ============================================
const supportsVibrate = 'vibrate' in navigator
const hapticSwitch = document.createElement('label')
hapticSwitch.setAttribute('aria-hidden', 'true')
hapticSwitch.style.cssText = 'position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;pointer-events:none;'
{
  const input = document.createElement('input')
  input.type = 'checkbox'
  input.setAttribute('switch', '')
  hapticSwitch.appendChild(input)
  document.body.appendChild(hapticSwitch)
}
function haptic(strong) {
  if (supportsVibrate) navigator.vibrate(strong ? 24 : 8)
  else hapticSwitch.click()
}

// ============================================
// 卡片文字：双层交叉淡入
// ============================================
let frontLayer = layerA
let backLayer = layerB
function fillLayer(layer, idx) {
  const t = TOPICS[idx]
  layer.children[0].textContent = t.title
  layer.children[1].textContent = t.desc
}
function updateCard(idx) {
  fillLayer(backLayer, idx)
  backLayer.classList.add('is-active')
  frontLayer.classList.remove('is-active')
  const tmp = frontLayer; frontLayer = backLayer; backLayer = tmp
  counter.textContent = String(idx + 1).padStart(2, '0')
  progressFill.style.width = (idx / (N - 1) * 100) + '%'
  slider.setAttribute('aria-valuenow', String(idx + 1))
  slider.setAttribute('aria-valuetext', TOPICS[idx].title)
}

// ============================================
// 布局：固定显示全部刻度（竖直居中）+ 卡片，整组水平居中
// ============================================
let centerY = window.innerHeight / 2
let rulerX = 0, cardX = 0, cardW = 300, spacing = 30, rulerTop = 0

function layout() {
  const vw = window.innerWidth, vh = window.innerHeight
  centerY = vh / 2
  cardW = clamp(vw * 0.76, 260, 400)
  const groupW = LINE_ACTIVE + TICK_X_GAP + cardW
  const groupLeft = Math.max(12, (vw - groupW) / 2)
  rulerX = groupLeft
  cardX = groupLeft + LINE_ACTIVE + TICK_X_GAP
  spacing = Math.min(MAX_SPACING, (vh * 0.78) / (N - 1))   // 全部塞进 78% 高度
  rulerTop = centerY - (N - 1) * spacing / 2
  document.documentElement.style.setProperty('--tick-x', rulerX + 'px')
  for (let i = 0; i < N; i++) ticks[i].style.top = (rulerTop + i * spacing) + 'px'
  applyCardGeom()
  drawTicks()
}

// ============================================
// 选择：sel = 连续选择位置（指针映射而来）
// ============================================
let sel = 0
let activeIndex = 0

function drawTicks() {
  for (let i = 0; i < N; i++) {
    const d = Math.abs(i - sel)
    const t = Math.max(0, 1 - d / FALLOFF)
    const e = t * t * (3 - 2 * t)
    const sx = (LINE_BASE + (LINE_ACTIVE - LINE_BASE) * e) / LINE_BASE
    const sy = 1 + 0.6 * e
    ticks[i].style.transform = `scaleX(${sx}) scaleY(${sy})`
    ticks[i].style.opacity = 0.18 + 0.82 * e
  }
}
function setSel(s) {
  sel = clamp(s, 0, N - 1)
  drawTicks()
  const idx = clamp(Math.round(sel), 0, N - 1)
  if (idx !== activeIndex) {
    activeIndex = idx
    haptic(idx === 0 || idx === N - 1)
    updateCard(idx)
  }
}
function activeTickY() { return rulerTop + activeIndex * spacing }
function selFromY(clientY) { return clamp((clientY - rulerTop) / spacing, 0, N - 1) }

// ============================================
// 卡片：从 active 刻度变形（spring）+ 竖直跟手（spring）
// ============================================
let ct = 0, ctv = 0, ctDest = 0
let cy = 0, cyv = 0, cyDest = 0
let cardK = CARD_K_IN, cardB = CARD_B_IN
let cardRaf = null, cardLast = 0
let hideTimer = null

function applyCardGeom() {
  const hgt = lerp(POINTER_H, CARD_H, ct)
  // 按当前高度夹取：药丸态(矮)几乎不夹、精确贴刻度；卡片态(高)才夹住不出屏
  const c = clamp(cy, hgt / 2 + 12, window.innerHeight - hgt / 2 - 12)
  card.style.left = lerp(rulerX, cardX, ct) + 'px'
  card.style.top = (c - hgt / 2) + 'px'
  card.style.width = lerp(POINTER_W, cardW, ct) + 'px'
  card.style.height = hgt + 'px'
  card.style.borderRadius = lerp(POINTER_R, CARD_RADIUS, ct) + 'px'
  const cp = clamp((ct - 0.55) / 0.4, 0, 1)
  cardContent.style.opacity = cp
  cardContent.style.filter = `blur(${(1 - cp) * 8}px)`
}
function cardFrame(now) {
  cardRaf = null
  let dt = (now - cardLast) / 1000
  cardLast = now
  if (dt > 1 / 30) dt = 1 / 30
  if (dt <= 0) dt = 1 / 60
  const h = dt / 4
  for (let i = 0; i < 4; i++) {
    ctv += (-cardK * (ct - ctDest) - cardB * ctv) * h
    ct += ctv * h
    cyv += (-CY_K * (cy - cyDest) - CY_B * cyv) * h
    cy += cyv * h
  }
  applyCardGeom()
  const done = Math.abs(ct - ctDest) < 0.0004 && Math.abs(ctv) < 0.0006
            && Math.abs(cy - cyDest) < 0.3 && Math.abs(cyv) < 0.5
  if (done) {
    ct = ctDest; ctv = 0; cy = cyDest; cyv = 0; applyCardGeom()
  } else {
    cardRaf = requestAnimationFrame(cardFrame)
  }
}
function startCardSpring() {
  if (cardRaf == null) { cardLast = performance.now(); cardRaf = requestAnimationFrame(cardFrame) }
}
function setCardTarget(d) {
  ctDest = d
  if (d > 0.5) { cardK = CARD_K_IN; cardB = CARD_B_IN }
  else { cardK = CARD_K_OUT; cardB = CARD_B_OUT }
  card.classList.toggle('card-on', d > 0.5)
}
function showCard() { clearTimeout(hideTimer); setCardTarget(1); startCardSpring() }
function hideCard() { setCardTarget(0); startCardSpring() }
function scheduleHide() { clearTimeout(hideTimer); hideTimer = setTimeout(hideCard, CARD_LINGER) }

// ============================================
// 交互：指针指到哪根 = active；卡片贴着指针走
// ============================================
let isInteracting = false
let hasCommittedDrag = false
let pressY = 0
let lastY = 0

function cardYForPointer(clientY) {
  return clientY - FINGER_OFFSET
}

slider.addEventListener('pointerdown', e => {
  slider.setPointerCapture(e.pointerId)
  isInteracting = true
  hasCommittedDrag = e.pointerType === 'mouse'
  pressY = e.clientY
  lastY = e.clientY
  clearTimeout(hideTimer)
  slider.classList.add('is-scrubbing')
  if (hasCommittedDrag) setSel(selFromY(e.clientY))
  cyDest = cardYForPointer(e.clientY)
  showCard()
})
slider.addEventListener('pointermove', e => {
  if (!isInteracting) return
  lastY = e.clientY
  if (!hasCommittedDrag && Math.abs(e.clientY - pressY) >= DRAG_SLOP) hasCommittedDrag = true
  if (hasCommittedDrag) setSel(selFromY(e.clientY))     // 选中跟着指针
  cyDest = cardYForPointer(e.clientY)     // 卡片避开一点手指
  startCardSpring()
})
function endInteract() {
  if (!isInteracting) return
  isInteracting = false
  if (!hasCommittedDrag) setSel(selFromY(lastY)) // 轻点仍然可以选择，但不在按下瞬间误跳
  slider.classList.remove('is-scrubbing')
  setSel(activeIndex)             // 吸附到整刻度
  cyDest = activeTickY() // 卡片对齐到选中刻度
  startCardSpring()
  scheduleHide()
}
slider.addEventListener('pointerup', endInteract)
slider.addEventListener('pointercancel', endInteract)

// ============================================
// 桌面：滚轮选择 + 方向键
// ============================================
const WHEEL_SEL = 0.012
let wheelStopTimer = null
slider.addEventListener('wheel', e => {
  e.preventDefault()
  clearTimeout(hideTimer)
  slider.classList.add('is-scrubbing')
  let d = e.deltaY
  if (e.deltaMode === 1) d *= 16
  else if (e.deltaMode === 2) d *= window.innerHeight
  setSel(sel + d * WHEEL_SEL)
  cyDest = activeTickY()
  showCard()
  startCardSpring()
  clearTimeout(wheelStopTimer)
  wheelStopTimer = setTimeout(() => {
    setSel(activeIndex)
    slider.classList.remove('is-scrubbing')
    cyDest = activeTickY()
    startCardSpring()
    scheduleHide()
  }, 140)
}, { passive: false })

window.addEventListener('keydown', e => {
  let dir = 0
  if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') dir = -1
  else if (e.key === 'ArrowDown' || e.key === 'ArrowRight') dir = 1
  else return
  e.preventDefault()
  clearTimeout(hideTimer)
  slider.classList.add('is-scrubbing')
  setSel(clamp(activeIndex + dir, 0, N - 1))
  slider.classList.remove('is-scrubbing')
  cyDest = activeTickY()
  showCard()
  startCardSpring()
  scheduleHide()
})

// ============================================
// 自适应
// ============================================
window.addEventListener('resize', () => {
  layout()
  if (!isInteracting) { cy = cyDest = activeTickY(); applyCardGeom() }
})

// ============================================
// 初始：选中第 1 个 topic，卡片收起（贴在该刻度）
// ============================================
layout()
activeIndex = 0
sel = 0
fillLayer(frontLayer, 0)
frontLayer.classList.add('is-active')
counter.textContent = '01'
progressFill.style.width = '0%'
cy = cyDest = activeTickY()
applyCardGeom()
drawTicks()
</script>

  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme"></button>
  <script>
    (function () {
      const SUN = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>'
      const MOON = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>'
      const btn = document.getElementById('themeToggle')
      function apply(light) {
        document.body.classList.toggle('light', light)
        btn.innerHTML = light ? SUN : MOON
        try { localStorage.setItem('topics-theme', light ? 'light' : 'dark') } catch (e) {}
      }
      let saved = null
      try { saved = localStorage.getItem('topics-theme') } catch (e) {}
      apply(saved === 'light')   // 默认黑色，仅当手动选过浅色才用浅色
      btn.addEventListener('click', function (e) { e.stopPropagation(); apply(!document.body.classList.contains('light')) })
    })()
  </script>
</body>
</html>
